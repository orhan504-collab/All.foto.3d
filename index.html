<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3D Model Studio</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 3D Builder</h1>
            <p>Fotoğraftan 3D Modele</p>
        </header>

        <main>
            <div class="card" id="upload-card">
                <div class="drop-zone" id="drop-zone">
                    <div class="icon">📸</div>
                    <p>Fotoğrafı seçmek için buraya tıkla</p>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <div id="preview-container" class="hidden">
                    <img id="imgPreview" src="" alt="Önizleme">
                </div>
                <button id="generateBtn" class="btn-primary">🧠 3D Model Oluştur</button>
            </div>

            <div class="card" id="viewer-card">
                <model-viewer id="modelViewer" camera-controls auto-rotate shadow-intensity="1" alt="3D Model">
                </model-viewer>
                <div class="controls">
                    <button id="downloadBtn" class="btn-secondary" disabled>⬇ STL İndir</button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
